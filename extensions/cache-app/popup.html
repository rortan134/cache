<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Cache App</title>
        <link rel="stylesheet" href="popup.css">
    </head>
    <body>
        <main class="panel">
            <h1 class="title">Cache App</h1>
            <p class="hint">
                Sync Instagram Saved and TikTok Favorites from the active tab,
                or import Chrome bookmarks into Cache with your consent.
            </p>

            <section class="section" aria-labelledby="manual-sync-heading">
                <h2 id="manual-sync-heading" class="section-title">
                    Manual sync
                </h2>
                <button type="button" id="sync" class="btn">
                    Sync current tab
                </button>
            </section>

            <section class="section" aria-labelledby="chrome-sync-heading">
                <div class="section-row">
                    <h2 id="chrome-sync-heading" class="section-title">
                        Chrome bookmarks
                    </h2>
                    <label class="switch">
                        <input type="checkbox" id="chromeContinuous">
                        <span>Continuous sync</span>
                    </label>
                </div>
                <label class="field">
                    <span class="field-label">Sync mode</span>
                    <select id="chromeMode" class="select">
                        <option value="one_time_import">
                            One-time import
                        </option>
                        <option value="continuous_sync">
                            Continuous sync
                        </option>
                    </select>
                </label>
                <p class="consent">
                    Cache will read your Chrome bookmarks and store them on the
                    Cache server for your signed-in account.
                </p>
                <button type="button" id="chromeSync" class="btn">
                    Import Chrome bookmarks
                </button>
            </section>

            <button type="button" id="openCache" class="btn btn-secondary">
                Open Cache
            </button>
            <p id="status" class="status" role="status"></p>
            <section class="meta" aria-label="Sync status">
                <p id="instagramMeta" class="meta-line"></p>
                <p id="tiktokMeta" class="meta-line"></p>
                <p id="chromeMeta" class="meta-line"></p>
            </section>
        </main>
        <script src="cache-config.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
